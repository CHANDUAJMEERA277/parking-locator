<!DOCTYPE html>

<html>
<head>
<title>Smart Parking Locator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
}
</style>

</head>

<body>

<h1>Smart Parking Locator 🚗</h1>

<h3 id="slot"></h3>

<button onclick="saveParking()">Save My Parking</button> <br> <button onclick="navigate()">Navigate to My Car</button>

<h3 id="msg"></h3>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lng = params.get("lng");
const slot = params.get("slot");

document.getElementById("slot").innerHTML =
"Parking Slot: " + slot;

function saveParking(){

localStorage.setItem("carLat",lat);
localStorage.setItem("carLng",lng);
localStorage.setItem("carSlot",slot);

document.getElementById("msg").innerHTML =
"Parking location saved!";
}

function navigate(){

let lat = localStorage.getItem("carLat");
let lng = localStorage.getItem("carLng");

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng
);

}

</script>

</body>
</html>
