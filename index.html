<!DOCTYPE html>

<html>
<head>
<title>Smart Parking Locator</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>Smart Parking Locator 🚗</h2>

<h3 id="parking"></h3>

<button onclick="save()">Save My Parking</button> <button onclick="find()">Find My Car</button>

<h3 id="result"></h3>

<script>

// read slot from QR code URL
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot");

if(slot){
document.getElementById("parking").innerHTML =
"Parking Slot: " + slot;
}

function save(){

localStorage.setItem("parkingLocation", slot);

document.getElementById("result").innerHTML =
"Parking location saved!";
}

function find(){

let location = localStorage.getItem("parkingLocation");

document.getElementById("result").innerHTML =
"Your car is parked at: " + location;

}

</script>

</body>
</html>
