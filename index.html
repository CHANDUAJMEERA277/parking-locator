<!DOCTYPE html>

<html>
<head>
<title>Smart Parking Locator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
}

</style>

</head>

<body>

<h1>Smart Parking Locator 🚗</h1>

<h3 id="slot"></h3>

<button onclick="saveParking()">Save My Parking</button> <br><br>

<button onclick="navigateMaps()">Navigate with Google Maps</button> <br>

<button onclick="mallGuide()">Mall Parking Guide</button>

<h3 id="msg"></h3>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lng = params.get("lng");
const slot = params.get("slot");

document.getElementById("slot").innerHTML =
"Parking Slot: " + slot;

function saveParking(){

localStorage.setItem("carLat",lat);
localStorage.setItem("carLng",lng);
localStorage.setItem("carSlot",slot);

document.getElementById("msg").innerHTML =
"Parking location saved successfully!";
}

function navigateMaps(){

let lat = localStorage.getItem("carLat");
let lng = localStorage.getItem("carLng");

if(lat && lng){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng
);

}else{

document.getElementById("msg").innerHTML =
"Please save parking first.";

}

}

function mallGuide(){

let slot = localStorage.getItem("carSlot");

if(slot){

document.getElementById("msg").innerHTML =
"🚗 Your car is parked at: "+slot+
"<br>Go to that basement floor and follow the slot number.";

}else{

document.getElementById("msg").innerHTML =
"Please press 'Save My Parking' first.";

}

}

</script>

</body>
</html>
