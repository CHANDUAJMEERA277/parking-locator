<!DOCTYPE html>

<html>
<head>
<title>Smart Parking Locator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

.container{
margin-top:80px;
background:white;
color:#333;
width:90%;
max-width:400px;
margin-left:auto;
margin-right:auto;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
font-size:28px;
margin-bottom:20px;
}

.slot{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.save{
background:#28a745;
color:white;
}

.maps{
background:#007bff;
color:white;
}

.guide{
background:#ff9800;
color:white;
}

button:hover{
opacity:0.9;
}

.message{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🚗 Smart Parking Locator</h1>

<div class="slot" id="slot"></div>

<button class="save" onclick="saveParking()">Save My Parking</button>

<button class="maps" onclick="navigateMaps()">Navigate with Google Maps</button>

<button class="guide" onclick="mallGuide()">Mall Parking Guide</button>

<div class="message" id="msg"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const lat = params.get("lat");
const lng = params.get("lng");
const slot = params.get("slot");

document.getElementById("slot").innerHTML =
"Parking Slot: " + slot;

function saveParking(){

localStorage.setItem("carLat",lat);
localStorage.setItem("carLng",lng);
localStorage.setItem("carSlot",slot);

document.getElementById("msg").innerHTML =
"✅ Parking location saved!";
}

function navigateMaps(){

let lat = localStorage.getItem("carLat");
let lng = localStorage.getItem("carLng");

if(lat && lng){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng
);

}else{

document.getElementById("msg").innerHTML =
"⚠️ Please save parking first.";

}

}

function mallGuide(){

let slot = localStorage.getItem("carSlot");

if(slot){

document.getElementById("msg").innerHTML =
"🚗 Your car is parked at: "+slot+
"<br>Go to that basement floor1 and follow the instrcutions to reach the slot number.";

}else{

document.getElementById("msg").innerHTML =
"⚠️ Please press 'Save My Parking' first.";

}

}

</script>

</body>
</html>
